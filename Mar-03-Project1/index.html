<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-box-seam"></i> Product Management</h2>
            <p class="text-muted">Danh sách sản phẩm từ API</p>
        </div>

        <!-- Controls Row -->
        <div class="row g-3 mb-3 align-items-end">
            <!-- Search -->
            <div class="col-md-6">
                <label for="searchInput" class="form-label fw-semibold">
                    <i class="bi bi-search"></i> Tìm kiếm theo Title
                </label>
                <input type="text" id="searchInput" class="form-control" placeholder="Nhập tên sản phẩm...">
            </div>
            <!-- Page size -->
            <div class="col-md-3">
                <label for="pageSizeSelect" class="form-label fw-semibold">
                    <i class="bi bi-list-ol"></i> Số phần tử / trang
                </label>
                <select id="pageSizeSelect" class="form-select">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                </select>
            </div>
            <!-- Info -->
            <div class="col-md-3 text-end">
                <span id="infoText" class="badge bg-secondary fs-6"></span>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle bg-white shadow-sm rounded">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Ảnh</th>
                        <th>
                            <div class="header-cell">
                                Title
                                <button class="sort-btn" data-sort="title" data-order="none"
                                    title="Sắp xếp theo Title">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </div>
                        </th>
                        <th>
                            <div class="header-cell">
                                Giá ($)
                                <button class="sort-btn" data-sort="price" data-order="none"
                                    title="Sắp xếp theo Giá">
                                    <i class="bi bi-arrow-down-up"></i>
                                </button>
                            </div>
                        </th>
                        <th>Category</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation">
            <ul id="pagination" class="pagination justify-content-center flex-wrap">
            </ul>
        </nav>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
